services:
  resonate:
    build: .
    container_name: resonate
    command:
      - serve
      - --config
      - /root/resonate.yaml
    volumes:
      - ./resonate.yaml:/root/resonate.yaml
    ports:
      - "8001:8001"
      - "8002:8002"
      - "50051:50051"
    depends_on:
      yb-init:
        condition: service_completed_successfully

  yb-node1:
    image: yugabytedb/yugabyte:2025.2.1.0-b141
    container_name: yb-node1
    command:
      - bin/yugabyted
      - start
      - --daemon=false
      - --advertise_address=yb-node1
      - --cloud_location=cloud.region.zone1
      - --fault_tolerance=zone
    ports:
      - "5433:5433"
      - "7001:7000"
      - "9000:9000"
      - "15433:15433"
    healthcheck:
      test: ["CMD-SHELL", "yugabyted status | grep -q 'Running'"]
      interval: 10s
      timeout: 5s
      retries: 20

  yb-node2:
    image: yugabytedb/yugabyte:2025.2.1.0-b141
    container_name: yb-node2
    command:
      - bin/yugabyted
      - start
      - --daemon=false
      - --advertise_address=yb-node2
      - --join=yb-node1
      - --cloud_location=cloud.region.zone2
      - --fault_tolerance=zone
    depends_on:
      yb-node1:
        condition: service_healthy

  yb-node3:
    image: yugabytedb/yugabyte:2025.2.1.0-b141
    container_name: yb-node3
    command:
      - bin/yugabyted
      - start
      - --daemon=false
      - --advertise_address=yb-node3
      - --join=yb-node1
      - --cloud_location=cloud.region.zone3
      - --fault_tolerance=zone
    depends_on:
      yb-node1:
        condition: service_healthy

  yb-init:
    image: yugabytedb/yugabyte:2025.2.1.0-b141
    container_name: yb-init
    depends_on:
      yb-node1:
        condition: service_healthy
      yb-node2:
        condition: service_started
      yb-node3:
        condition: service_started
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -euo pipefail
        masters="yb-node1:7100,yb-node2:7100,yb-node3:7100"
        until ysqlsh -h yb-node1 -U yugabyte -c '\l' 2>/dev/null; do
          echo "Waiting for YSQL to be ready..."
          sleep 2
        done
        until yb-admin -master_addresses "$$masters" list_all_masters >/dev/null 2>&1; do
          echo "Waiting for all masters to be ready..."
          sleep 2
        done
        echo "Configuring replication factor 3..."
        yb-admin -master_addresses "$$masters" \
          modify_placement_info cloud.region.zone1,cloud.region.zone2,cloud.region.zone3 3
        echo "Creating resonate database..."
        ysqlsh -h yb-node1 -U yugabyte -c "SELECT 'exists' FROM pg_database WHERE datname='resonate'" | grep -q exists || \
          ysqlsh -h yb-node1 -U yugabyte -c "CREATE DATABASE resonate"
        echo "Database ready."
    restart: "no"
