# YugabyteDB benchmark environment — single-node, for micro/load benchmarks.
#
# Use this when you want fast startup and don't need fault-tolerance testing.
# For a 3-node cluster with RF=3, use docker-compose.bench-yugabyte.yml instead.
#
# ── Usage ────────────────────────────────────────────────────────────────────
#
# 1. Start the node and wait for it to be ready:
#      docker compose -f docker/docker-compose.bench-yugabyte-single.yml up -d yb-node1 yb-init
#      docker compose -f docker/docker-compose.bench-yugabyte-single.yml wait yb-init
#
# 2. Run micro-benchmarks:
#      docker compose -f docker/docker-compose.bench-yugabyte-single.yml run --rm bench-runner
#
# 3. Run the sustained load test instead:
#      docker compose -f docker/docker-compose.bench-yugabyte-single.yml run --rm \
#        -e BENCH_TARGET=load \
#        -e BENCH_LOAD_DURATION=60s \
#        -e BENCH_CSV_PATH=/results/load.csv \
#        bench-runner
#      # Results are written to benchmarks/results/load.csv on your host.
#
# Tear down:
#      docker compose -f docker/docker-compose.bench-yugabyte-single.yml down -v

services:
  # ── YugabyteDB single node ────────────────────────────────────────────────

  yb-node1:
    image: yugabytedb/yugabyte:2025.2.1.0-b141
    container_name: yb-node1
    command:
      - bin/yugabyted
      - start
      - --daemon=false
      - --advertise_address=yb-node1
    ports:
      - "5433:5433"   # YSQL
      - "7001:7000"   # master web UI
      - "9000:9000"   # tserver web UI
      - "15433:15433" # yugabyted web UI
    healthcheck:
      test: ["CMD-SHELL", "yugabyted status | grep -q 'Running'"]
      interval: 10s
      timeout: 5s
      retries: 20

  yb-init:
    image: yugabytedb/yugabyte:2025.2.1.0-b141
    container_name: yb-init
    depends_on:
      yb-node1:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -euo pipefail
        until ysqlsh -h yb-node1 -U yugabyte -c '\l' 2>/dev/null; do
          echo "Waiting for YSQL..."
          sleep 2
        done
        echo "Creating resonate database..."
        ysqlsh -h yb-node1 -U yugabyte -c \
          "SELECT 'exists' FROM pg_database WHERE datname='resonate'" \
          | grep -q exists \
          || ysqlsh -h yb-node1 -U yugabyte -c "CREATE DATABASE resonate WITH COLOCATION = TRUE"
        echo "YugabyteDB single-node ready."
    restart: "no"

  # ── Benchmark runner ──────────────────────────────────────────────────────

  bench-runner:
    image: golang:1.25-alpine
    container_name: yb-bench-runner
    volumes:
      - ..:/workspace:ro
      - ../benchmarks/results:/results
    working_dir: /workspace
    environment:
      TEST_AIO_SUBSYSTEMS_STORE_YUGABYTE_CONFIG_HOST: yb-node1
      TEST_AIO_SUBSYSTEMS_STORE_YUGABYTE_CONFIG_PORT: "5433"
      TEST_AIO_SUBSYSTEMS_STORE_YUGABYTE_CONFIG_USERNAME: yugabyte
      TEST_AIO_SUBSYSTEMS_STORE_YUGABYTE_CONFIG_PASSWORD: yugabyte
      TEST_AIO_SUBSYSTEMS_STORE_YUGABYTE_CONFIG_DATABASE: resonate
      TEST_AIO_SUBSYSTEMS_STORE_YUGABYTE_CONFIG_LOAD_BALANCE: "false"
      BENCH_TARGET: ${BENCH_TARGET:-micro}
      BENCH_BATCH_SIZE: 1000
      BENCH_LOAD_DURATION: ${BENCH_LOAD_DURATION:-60s}
      BENCH_CSV_PATH: ${BENCH_CSV_PATH:-/results/load.csv}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if [ "$$BENCH_TARGET" = "load" ]; then
          exec go test -run=^$$ -bench=BenchmarkYugabyteStoreLoad \
            -benchtime=1x -timeout 60m \
            ./internal/app/subsystems/aio/store/yugabyte/
        else
          export BENCH_BACKEND=yugabyte
          export BENCH_MICRO_CSV_PATH=/results/micro_yugabyte_single.csv
          exec go test -run=^$$ -bench=^BenchmarkYugabyteStore$$ \
            -benchtime=30s -count=3 -benchmem -timeout 20m \
            ./internal/app/subsystems/aio/store/yugabyte/
        fi
    depends_on:
      yb-init:
        condition: service_completed_successfully
    profiles:
      - bench